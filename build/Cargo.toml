[package]
name = "data_vault"
version = "0.1.0"
edition = "2021"

[dependencies]
rand = "0.8"
sha2 = "0.10"
ed25519-dalek = "2.1"
chacha20poly1305 = "0.10"
tiny_http = "0.12"
reqwest = { version = "0.12", features = ["json", "blocking", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
